<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Juke Alpha Invite</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Condensed:ital,wght@0,400;0,700;0,900;1,400;1,700;1,900&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #111;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Archivo Condensed', sans-serif;
  }

  .graphic {
    width: 1080px;
    height: 1350px;
    background: #0A0A0A;
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    justify-content: space-between;
    padding: 80px;
  }

  /* Noise texture */
  .graphic::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E");
    opacity: 0.035;
    pointer-events: none;
    z-index: 1;
  }

  /* Glow top-right */
  .glow-tr {
    position: absolute;
    top: -220px;
    right: -220px;
    width: 750px;
    height: 750px;
    background: radial-gradient(circle, rgba(123,47,255,0.16) 0%, rgba(255,0,128,0.12) 35%, transparent 65%);
    pointer-events: none;
    z-index: 0;
  }

  /* Glow bottom-left */
  .glow-bl {
    position: absolute;
    bottom: -250px;
    left: -180px;
    width: 620px;
    height: 620px;
    background: radial-gradient(circle, rgba(255,0,128,0.09) 0%, transparent 65%);
    pointer-events: none;
    z-index: 0;
  }

  /* Subtle grid */
  .grid {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.022) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.022) 1px, transparent 1px);
    background-size: 90px 90px;
    pointer-events: none;
    z-index: 0;
  }

  /* Vertical accent line */
  .accent-line {
    position: absolute;
    top: 0;
    left: 500px;
    width: 1px;
    height: 100%;
    background: linear-gradient(
      to bottom,
      transparent 0%,
      rgba(255,0,128,0.06) 20%,
      rgba(255,0,128,0.20) 50%,
      rgba(255,0,128,0.06) 80%,
      transparent 100%
    );
    z-index: 0;
  }

  /* Corner marks */
  .corner {
    position: absolute;
    width: 28px;
    height: 28px;
    z-index: 2;
  }
  .corner::before,
  .corner::after {
    content: '';
    position: absolute;
    background: rgba(255,0,128,0.35);
  }
  .corner::before { width: 100%; height: 1px; top: 0; left: 0; }
  .corner::after  { width: 1px; height: 100%; top: 0; left: 0; }
  .corner.tl { top: 40px; left: 40px; }
  .corner.tr { top: 40px; right: 40px; transform: scaleX(-1); }
  .corner.bl { bottom: 40px; left: 40px; transform: scaleY(-1); }
  .corner.br { bottom: 40px; right: 40px; transform: scale(-1,-1); }

  /* ── Top section ── */
  .top {
    position: relative;
    z-index: 2;
    display: flex;
    flex-direction: column;
  }

  /* Logo */
  .logo-wrap {
    margin-bottom: 56px;
  }
  .logo-wrap svg {
    width: 260px;
    height: auto;
    display: block;
  }

  /* Alpha badge */
  .alpha-badge {
    display: inline-flex;
    align-items: center;
    gap: 9px;
    background: rgba(255,0,128,0.08);
    border: 1px solid rgba(255,0,128,0.3);
    border-radius: 4px;
    padding: 7px 18px;
    margin-bottom: 44px;
    width: fit-content;
  }
  .alpha-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #FF0080;
    box-shadow: 0 0 8px rgba(255,0,128,0.9);
  }
  .alpha-text {
    font-family: 'Archivo Condensed', sans-serif;
    font-size: 13px;
    font-weight: 700;
    font-style: italic;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: #FF0080;
  }

  /* Invite line */
  .invite {
    font-family: 'Instrument Serif', serif;
    font-style: italic;
    font-size: 30px;
    color: rgba(255,255,255,0.42);
    margin-bottom: 18px;
    line-height: 1;
  }

  /* Big headline */
  .headline {
    font-family: 'Archivo Condensed', sans-serif;
    font-weight: 900;
    font-style: italic;
    font-size: 188px;
    line-height: 0.85;
    text-transform: uppercase;
    letter-spacing: -0.01em;
    color: #fff;
  }
  .headline .hl-accent {
    display: block;
    background: linear-gradient(90deg, #FF0080 0%, #7B2FFF 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  /* ── Middle section ── */
  .middle {
    position: relative;
    z-index: 2;
    display: flex;
    flex-direction: column;
    gap: 22px;
  }

  .rule {
    width: 44px;
    height: 2px;
    background: linear-gradient(90deg, #FF0080, #7B2FFF);
  }

  .tagline {
    font-family: 'Instrument Serif', serif;
    font-style: italic;
    font-size: 33px;
    color: rgba(255,255,255,0.68);
    line-height: 1.35;
    max-width: 640px;
  }
  .tagline strong {
    font-style: normal;
    color: #fff;
    font-weight: 400;
  }

  /* ── Bottom section ── */
  .bottom {
    position: relative;
    z-index: 2;
    display: flex;
    flex-direction: column;
    gap: 32px;
    width: 100%;
  }

  .cta-block {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .cta-label {
    font-family: 'Archivo Condensed', sans-serif;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.28);
  }
  .cta-url {
    font-family: 'Archivo Condensed', sans-serif;
    font-weight: 900;
    font-style: italic;
    font-size: 52px;
    text-transform: uppercase;
    letter-spacing: 0.01em;
    color: #fff;
    line-height: 1;
    background: linear-gradient(90deg, #fff 0%, rgba(255,255,255,0.75) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .bottom-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    width: 100%;
    padding-top: 28px;
    border-top: 1px solid rgba(255,255,255,0.07);
  }

  /* Slogan in bottom bar */
  .slogan {
    font-family: 'Instrument Serif', serif;
    font-size: 18px;
    font-style: italic;
    color: rgba(255,255,255,0.32);
    letter-spacing: 0.01em;
  }
  .slogan em {
    font-style: italic;
    color: rgba(255,255,255,0.62);
  }

  .seats-note {
    font-family: 'Archivo Condensed', sans-serif;
    font-size: 12px;
    font-weight: 700;
    font-style: italic;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.2);
  }
</style>
</head>
<body>
<div class="graphic">

  <!-- BG -->
  <div class="glow-tr"></div>
  <div class="glow-bl"></div>
  <div class="grid"></div>
  <div class="accent-line"></div>

  <!-- Corners -->
  <div class="corner tl"></div>
  <div class="corner tr"></div>
  <div class="corner bl"></div>
  <div class="corner br"></div>

  <!-- TOP -->
  <div class="top">
    <!-- Juke Logo -->
    <div class="logo-wrap">
      <svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 478.3 75.2">
        <defs>
          <linearGradient id="logo-grad" x1="108.5" y1="183.7" x2="385.2" y2="-93.1" gradientUnits="userSpaceOnUse">
            <stop offset="0" stop-color="#ff0080"/>
            <stop offset="1" stop-color="#7b2fff"/>
          </linearGradient>
        </defs>
        <path fill="url(#logo-grad)" d="M172.2,0h32.5v33.3c0,27.9-21.7,41.9-65.1,41.9s-65.1-14-65.1-41.9V0h32.5v32.2c0,12.5,10.8,18.8,32.5,18.8s32.5-6.3,32.5-18.8h0V0ZM32.5,32.2h0c0,12.5-10.8,18.8-32.5,18.8v24.2c43.4,0,65.1-14,65.1-41.9V0h-32.5v32.2ZM478.3,21.2V0h-130.2v73.5h130.2v-21.2h-97.6v-6.5h86.3v-18h-86.3v-6.5h97.6ZM342.6,0h-47.6l-46.9,29.6V0h-32.5v73.5h32.5v-15.9l19-11.7,33.8,27.5h44.8l-54-42.3L342.6,0Z"/>
      </svg>
    </div>

    <!-- Badge -->
    <div class="alpha-badge">
      <div class="alpha-dot"></div>
      <span class="alpha-text">Alpha Access — Limited Seats</span>
    </div>

    <div class="invite">you're invited.</div>
    <div class="headline">
      BE<span class="hl-accent">FIRST.</span>
    </div>
  </div>

  <!-- MIDDLE -->
  <div class="middle">
    <div class="rule"></div>
    <div class="tagline">
      The recruiting platform built for <strong>student-athletes</strong> — and you're getting in <strong>first.</strong>
    </div>
  </div>

  <!-- BOTTOM -->
  <div class="bottom">
    <div class="cta-block">
      <div class="cta-label">Get early access</div>
      <div class="cta-url">shejukes.com</div>
    </div>
    <div class="bottom-bar">
      <div class="slogan">Recruiting <em>her</em> way.</div>
      <div class="seats-note">Family &amp; Friends only ✦</div>
    </div>
  </div>

</div>
</body>
</html>
